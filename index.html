<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitCoach AI - 穩定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+HK', sans-serif; background-color: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #2563eb; border-bottom: 2px solid #2563eb; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-xl font-black text-slate-900">FitCoach<span class="text-blue-600">AI</span></h1>
        <div class="flex gap-4">
            <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn active text-xs font-bold pb-1">設定</button>
            <button onclick="switchTab('plan')" id="btn-plan" class="nav-btn text-xs font-bold pb-1 text-slate-400">計劃</button>
            <button onclick="switchTab('calc')" id="btn-calc" class="nav-btn text-xs font-bold pb-1 text-slate-400">紀錄</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div id="tab-profile" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                <h2 class="text-lg font-black text-slate-800 mb-4">輸入個人資料</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="age" placeholder="年齡" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                        <input type="number" id="height" placeholder="身高(cm)" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weight" placeholder="體重(kg)" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                        <input type="number" id="target_weight" placeholder="目標(kg)" class="w-full p-3 bg-blue-50 rounded-2xl border-0 text-sm font-bold outline-none">
                    </div>
                    <select id="activity" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                        <option value="久坐">久坐 (Office/學生)</option>
                        <option value="適中">每週運動 2-3 次</option>
                        <option value="高強度">每週運動 5 次以上</option>
                    </select>
                    <textarea id="habit" placeholder="備註：飲食偏好、舊患..." class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm h-24 outline-none"></textarea>
                    <button onclick="startAiAnalysis()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm active:scale-95 transition shadow-lg">啟動 AI 教練 ✨</button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-6">
            <div id="ai-loading" class="hidden text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-sm text-slate-500 font-bold">AI 教練正在設計方案...</p>
            </div>
            <div id="ai-error" class="hidden bg-red-50 p-4 rounded-2xl text-red-600 text-[10px]">
                <p class="font-bold mb-1">連線錯誤：</p>
                <code id="error-msg" class="block break-words opacity-80"></code>
            </div>
            <div id="ai-result" class="hidden space-y-6">
                <!-- AI 結果顯示區域 -->
                <div class="bg-slate-900 p-6 rounded-[32px] text-white">
                    <h3 class="text-lg font-black italic mb-2">Strategy</h3>
                    <p id="strategy-text" class="text-xs opacity-90 leading-relaxed mb-4"></p>
                    <div class="text-[10px] grid grid-cols-2 gap-2 opacity-70">
                        <div>每日熱量: <span id="target-kcal" class="text-blue-400 font-bold"></span> kcal</div>
                        <div>達成時間: <span id="target-timeline" class="text-blue-400 font-bold"></span></div>
                    </div>
                </div>
                <div id="diet-plan" class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 text-xs text-slate-600 leading-relaxed"></div>
                <div id="workout-plan" class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100 text-xs text-slate-600 leading-relaxed"></div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = "AIzaSyAj2PG2SUPmAq2vh-WA3G3XcZ78VH5rLzQ";
        
        // 核心修正：確保 URL 路徑包含正確的模型識別碼
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        let state = { plan: null, consumed: 0 };

        async function startAiAnalysis() {
            const age = document.getElementById('age').value;
            const w = document.getElementById('weight').value;
            const tw = document.getElementById('target_weight').value;
            const h = document.getElementById('height').value;
            if(!age || !w || !tw || !h) return alert("請填好資料");

            switchTab('plan');
            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-result').classList.add('hidden');
            document.getElementById('ai-error').classList.add('hidden');

            const prompt = `你係專業香港減肥導師。用戶${age}歲, 現時${w}kg, 目標${tw}kg, 身高${h}cm, 活動量${document.getElementById('activity').value}。
            請以廣東話生成：[STRATEGY: 分析][KCAL: 數字][TIME: 時間][DIET: 飲食詳情][WORKOUT: 健身詳情]`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }]
                    })
                });

                const data = await response.json();
                if (!response.ok) throw new Error(JSON.stringify(data.error));

                const text = data.candidates[0].content.parts[0].text;
                const extract = (tag) => {
                    const match = text.match(new RegExp(`\\[${tag}:\\s*([\\s\\S]*?)\\]`));
                    return match ? match[1].trim() : "未提供";
                };

                document.getElementById('strategy-text').innerText = extract('STRATEGY');
                document.getElementById('target-kcal').innerText = extract('KCAL');
                document.getElementById('target-timeline').innerText = extract('TIME');
                document.getElementById('diet-plan').innerHTML = `<b>🥗 飲食建議：</b><br>${extract('DIET').replace(/\n/g, '<br>')}`;
                document.getElementById('workout-plan').innerHTML = `<b>🏋️ 運動建議：</b><br>${extract('WORKOUT').replace(/\n/g, '<br>')}`;
                
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-result').classList.remove('hidden');
            } catch (e) {
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-error').classList.remove('hidden');
                document.getElementById('error-msg').innerText = e.message;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }
    </script>
</body>
</html>
