<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitCoach AI - Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+HK', sans-serif; background: #0f172a; color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #3b82f6; border-bottom: 3px solid #3b82f6; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .task-done { text-decoration: line-through; opacity: 0.4; }
        input:focus, textarea:focus { outline: 2px solid #3b82f6; }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-slate-900/80 sticky top-0 z-50 px-6 py-4 flex justify-between items-center border-b border-white/5">
        <h1 class="text-xl font-black tracking-tighter text-blue-500">FITCOACH<span class="text-white">PRO</span></h1>
        <div class="flex gap-4">
            <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn active text-[10px] font-black uppercase pb-1">設定</button>
            <button onclick="switchTab('plan')" id="btn-plan" class="nav-btn text-[10px] font-black uppercase pb-1 text-slate-500">追蹤</button>
            <button onclick="switchTab('calc')" id="btn-calc" class="nav-btn text-[10px] font-black uppercase pb-1 text-slate-500">熱量</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div id="tab-profile" class="tab-content active space-y-4">
            <div class="glass-card p-6 rounded-[32px]">
                <h2 class="text-sm font-black text-blue-400 mb-4 uppercase tracking-widest">User Profile</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="age" placeholder="歲數" class="w-full p-4 bg-slate-800 rounded-2xl border-0 text-sm">
                        <input type="number" id="height" placeholder="身高 cm" class="w-full p-4 bg-slate-800 rounded-2xl border-0 text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weight" placeholder="現時 kg" class="w-full p-4 bg-slate-800 rounded-2xl border-0 text-sm text-blue-400 font-bold">
                        <input type="number" id="target_weight" placeholder="目標 kg" class="w-full p-4 bg-slate-800 rounded-2xl border-0 text-sm text-green-400 font-bold">
                    </div>
                    <textarea id="habit" placeholder="備註：例如「膝頭痛、想減肚腩、去開邊間 24/7...」" class="w-full p-4 bg-slate-800 rounded-2xl border-0 text-sm h-28"></textarea>
                    <button onclick="startAiAnalysis()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition">
                        生成今日訓練清單 ⚡️
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-6">
            <div id="ai-loading" class="hidden text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-xs font-bold text-slate-500">教練執緊 24/7 機器清單...</p>
            </div>

            <div id="ai-result" class="hidden space-y-6">
                <div class="glass-card p-6 rounded-[32px] border-l-4 border-blue-500">
                    <p id="strategy-text" class="text-xs leading-relaxed opacity-80 italic"></p>
                    <div class="flex gap-4 mt-4">
                        <div class="text-center bg-white/5 p-3 rounded-2xl flex-1">
                            <span class="block text-[8px] uppercase opacity-50">目標熱量</span>
                            <span id="target-kcal" class="text-lg font-black text-blue-400">0</span>
                        </div>
                        <div class="text-center bg-white/5 p-3 rounded-2xl flex-1">
                            <span class="block text-[8px] uppercase opacity-50">預計達成</span>
                            <span id="target-timeline" class="text-lg font-black text-green-400">0</span>
                        </div>
                    </div>
                </div>

                <div class="space-y-4">
                    <h4 class="text-xs font-black uppercase tracking-widest text-slate-500">今日時間規劃</h4>
                    
                    <div class="glass-card p-4 rounded-3xl space-y-3">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 rounded-full bg-orange-500"></span>
                            <span class="text-xs font-bold">飲食安排</span>
                        </div>
                        <div id="diet-list" class="space-y-2"></div>
                    </div>

                    <div class="glass-card p-4 rounded-3xl space-y-3">
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                            <span class="text-xs font-bold">24/7 機械重訓</span>
                        </div>
                        <div id="workout-list" class="space-y-2"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="tab-calc" class="tab-content space-y-6">
            <div class="bg-blue-600 p-10 rounded-[40px] text-white text-center shadow-2xl">
                <p class="text-white/60 text-[10px] font-black uppercase mb-1">今日剩餘額度</p>
                <div class="text-7xl font-black mb-4 tracking-tighter" id="kcal-left">--</div>
                <div class="text-[10px] font-bold bg-black/20 inline-block px-4 py-1 rounded-full">
                    目標 <span id="kcal-target-val">--</span> | 已食 <span id="kcal-consumed">0</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="addKcal(400)" class="glass-card p-6 rounded-3xl text-center active:scale-95 transition">
                    <span class="block text-xl mb-1">🍛</span>
                    <span class="text-xs font-black">正餐 (+400)</span>
                </button>
                <button onclick="addKcal(150)" class="glass-card p-6 rounded-3xl text-center active:scale-95 transition">
                    <span class="block text-xl mb-1">🍏</span>
                    <span class="text-xs font-black">零食 (+150)</span>
                </button>
            </div>
            <button onclick="resetKcal()" class="w-full text-slate-500 text-[10px] font-black uppercase py-4">Reset Data</button>
        </div>

    </main>

    <script>
        const GROQ_KEY = "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";
        let state = { plan: { targetKcal: 2000 }, consumed: 0 };

        async function startAiAnalysis() {
            const age = document.getElementById('age').value;
            const w = document.getElementById('weight').value;
            const tw = document.getElementById('target_weight').value;
            const h = document.getElementById('height').value;
            const habit = document.getElementById('habit').value;

            if(!age || !w || !tw || !h) return alert("填晒資料先，教練要睇！");

            switchTab('plan');
            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-result').classList.add('hidden');

            const prompt = `你係 24/7 Fitness 嘅地獄教練。
            用戶資料：${age}歲, ${w}kg, 目標${tw}kg, 身高${h}cm, 備註：${habit}。
            請以「極度地道廣東話」生成計劃。格式要求：
            [STRATEGY: 一句起兩句止嘅毒舌激勵]
            [KCAL: 淨數字]
            [TIME: 達成周期]
            [DIET: 格式必須係 "食物名|時間; 食物名|時間" 咁樣列出三餐同零食]
            [WORKOUT: 格式必須係 "機器名|組數次數; 機器名|組數次數" 列出 24/7 必做機器]`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }]
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;

                const extract = (tag) => text.match(new RegExp(`\\[${tag}:\\s*([\\s\\S]*?)\\]`))?.[1]?.trim() || "";

                document.getElementById('strategy-text').innerText = "「" + extract('STRATEGY') + "」";
                document.getElementById('target-kcal').innerText = extract('KCAL');
                document.getElementById('target-timeline').innerText = extract('TIME');

                // 處理飲食清單 (轉成 Task Checkbox)
                const diets = extract('DIET').split(';');
                document.getElementById('diet-list').innerHTML = diets.map(d => `
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl" onclick="this.classList.toggle('task-done')">
                        <input type="checkbox" class="rounded border-slate-700 bg-slate-800">
                        <span class="text-xs text-slate-300">${d.trim()}</span>
                    </div>
                `).join('');

                // 處理健身清單 (轉成 Task Checkbox)
                const workouts = extract('WORKOUT').split(';');
                document.getElementById('workout-list').innerHTML = workouts.map(w => `
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl" onclick="this.classList.toggle('task-done')">
                        <input type="checkbox" class="rounded border-slate-700 bg-slate-800">
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-blue-300">${w.split('|')[0]}</span>
                            <span class="text-[10px] text-slate-500">${w.split('|')[1] || '量力而為'}</span>
                        </div>
                    </div>
                `).join('');
                
                state.plan.targetKcal = parseInt(extract('KCAL')) || 2000;
                updateCalc();
                save();

                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-result').classList.remove('hidden');
            } catch (e) {
                alert("API 爆咗，請重試！");
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function addKcal(amt) { state.consumed += amt; updateCalc(); save(); }
        function resetKcal() { state.consumed = 0; updateCalc(); save(); }
        function updateCalc() {
            const target = state.plan.targetKcal;
            document.getElementById('kcal-target-val').innerText = target;
            document.getElementById('kcal-consumed').innerText = state.consumed;
            document.getElementById('kcal-left').innerText = target - state.consumed;
        }
        function save() { localStorage.setItem('fit_tracker_v3', JSON.stringify(state)); }
        function load() {
            const s = localStorage.getItem('fit_tracker_v3');
            if(s) { state = JSON.parse(s); updateCalc(); }
        }
        load();
    </script>
</body>
</html>
