<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitCoach AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+HK', sans-serif; background: #0b0f19; color: #ffffff; overflow-x: hidden; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-bg { background: #161c2d; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        
        /* Being Sport Timeline Style */
        .timeline-item { position: relative; padding-left: 30px; border-left: 2px solid rgba(59, 130, 246, 0.2); margin-left: 10px; }
        .timeline-dot { position: absolute; left: -7px; top: 12px; width: 12px; height: 12px; border-radius: 50%; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .diet-dot { background: #f97316; box-shadow: 0 0 10px #f97316; }

        .is-completed { opacity: 0.3; filter: grayscale(1); text-decoration: line-through; }
        .nav-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 flex justify-between items-center sticky top-0 bg-[#0b0f19]/90 backdrop-blur-md z-50">
        <h1 class="text-xl font-black italic tracking-tighter">FITCOACH<span class="text-blue-500">AI</span></h1>
        <div class="flex gap-4 text-xs font-bold text-slate-500">
            <button onclick="switchTab('profile')" id="nav-profile" class="nav-active pb-1">設定</button>
            <button onclick="switchTab('plan')" id="nav-plan" class="pb-1">今日</button>
            <button onclick="switchTab('week')" id="nav-week" class="pb-1">課表</button>
            <button onclick="switchTab('stats')" id="nav-stats" class="pb-1">趨勢</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">

        <div id="tab-profile" class="tab-content active space-y-6">
            <div class="card-bg p-6 space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="age" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm" placeholder="年齡">
                    <input type="number" id="height" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm" placeholder="身高 CM">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="weight" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm text-blue-400 font-bold" placeholder="現時 KG">
                    <input type="number" id="target" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm text-green-400 font-bold" placeholder="目標 KG">
                </div>
                <textarea id="habit" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm h-24" placeholder="需求備註（例如：膝痛、想練腹肌、自煮...）"></textarea>
                <button onclick="generatePlan()" id="btn-main" class="w-full bg-blue-600 py-4 rounded-2xl font-black text-sm active:scale-95 transition-all">更新 AI 計劃</button>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-8">
            <div class="card-bg p-5 border-l-4 border-blue-500">
                <p class="text-[10px] font-black text-blue-400 uppercase mb-1">Coach Strategy</p>
                <p id="strategy-txt" class="text-xs text-slate-300 leading-relaxed italic">請先完成設定...</p>
            </div>

            <div class="space-y-4">
                <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest">🥗 飲食方案</h4>
                <div id="diet-list" class="space-y-0"></div>
            </div>

            <div class="space-y-4">
                <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest">🏋️ 訓練任務</h4>
                <div id="workout-list" class="space-y-0"></div>
            </div>
        </div>

        <div id="tab-week" class="tab-content space-y-4">
            <h4 class="text-xs font-black text-slate-500 uppercase tracking-widest">7-Day Split</h4>
            <div id="week-list" class="space-y-2"></div>
        </div>

        <div id="tab-stats" class="tab-content">
            <div class="card-bg p-6"><canvas id="weightChart"></canvas></div>
        </div>

    </main>

    <script>
        const GROQ_API = "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";
        let state = JSON.parse(localStorage.getItem('fitcoach_pro_v11')) || { history: [] };

        async function generatePlan() {
            const fields = { age: 'age', h: 'height', w: 'weight', t: 'target', habit: 'habit' };
            const vals = {};
            for (let key in fields) vals[key] = document.getElementById(fields[key]).value;

            if (!vals.age || !vals.w) return alert("請填寫基本資料");

            const btn = document.getElementById('btn-main');
            btn.innerText = "AI 正在分析...";
            btn.disabled = true;

            const prompt = `你是一位專業健身教練。
            資料：${vals.age}歲, ${vals.h}cm, 現時${vals.w}kg, 目標${vals.t}kg, 需求：${vals.habit}。
            輸出格式（嚴格）：
            [STRATEGY: 廣東話分析]
            [DIET: 早餐|內容; 午餐|內容; 晚餐|內容]
            [WORKOUT: 動作|組數次數; 動作|組數次數; 動作|組數次數]
            [WEEKLY: 週一:重點|動作; 週二:重點|動作; 週三:重點|動作; 週四:重點|動作; 週五:重點|動作; 週六:重點|動作; 週日:重點|動作]`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_API}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }] })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;

                // 強力正則解析：忽略大小寫與多餘空格
                const parse = (tag) => {
                    const reg = new RegExp(`\\[${tag}:\\s*([\\s\\S]*?)\\]`, 'i');
                    const m = text.match(reg);
                    return m ? m[1].trim() : "";
                };

                // 渲染與持久化
                document.getElementById('strategy-txt').innerText = parse('STRATEGY');

                const renderItems = (containerId, rawData, dotClass) => {
                    document.getElementById(containerId).innerHTML = rawData.split(/;|；/).filter(s => s.includes('|')).map(item => {
                        const [title, detail] = item.split('|');
                        return `
                            <div class="timeline-item pb-6" onclick="this.classList.toggle('is-completed')">
                                <div class="timeline-dot ${dotClass}"></div>
                                <p class="text-sm font-bold text-slate-100">${title.trim()}</p>
                                <p class="text-[10px] text-slate-500 mt-1">${detail ? detail.trim() : ''}</p>
                            </div>`;
                    }).join('');
                };

                renderItems('diet-list', parse('DIET'), 'diet-dot');
                renderItems('workout-list', parse('WORKOUT'), '');

                // 課表
                document.getElementById('week-list').innerHTML = parse('WEEKLY').split(/;|；/).filter(s => s.includes(':')).map(item => {
                    const [day, content] = item.split(':');
                    const [focus, act] = (content || "").split('|');
                    return `<div class="card-bg p-4 flex justify-between items-center text-[10px]">
                        <span class="font-black text-slate-500 w-10">${day.trim()}</span>
                        <span class="font-bold text-blue-400">${focus ? focus.trim() : ''}</span>
                        <span class="text-slate-600">${act ? act.trim() : ''}</span>
                    </div>`;
                }).join('');

                switchTab('plan');
                save(vals);
            } catch (err) {
                alert("連線錯誤，請檢查網路或 API Key");
            } finally {
                btn.innerText = "更新 AI 計劃";
                btn.disabled = false;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('header button').forEach(b => b.classList.remove('nav-active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('nav-' + tab).classList.add('nav-active');
            if (tab === 'stats') initChart();
        }

        function save(vals) {
            state = { ...state, ...vals };
            localStorage.setItem('fitcoach_pro_v11', JSON.stringify(state));
        }

        function initChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            new Chart(ctx, { 
                type: 'line', 
                data: { labels: ['Start', 'Current', 'Target'], datasets: [{ data: [state.w, state.w, state.t], borderColor: '#3b82f6', tension: 0.4 }] },
                options: { plugins: { legend: { display: false } } }
            });
        }

        // 初始化加載
        if (state.age) {
            document.getElementById('age').value = state.age;
            document.getElementById('height').value = state.h;
            document.getElementById('weight').value = state.w;
            document.getElementById('target').value = state.t;
            document.getElementById('habit').value = state.habit;
        }
    </script>
</body>
</html>
