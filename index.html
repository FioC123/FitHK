<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitCoach AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+HK', sans-serif; background: #f8fafc; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .mentor-card { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="pb-24">

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black italic">FITCOACH<span class="text-blue-600">AI</span></h1>
        <div class="flex gap-6">
            <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn active text-xs font-black pb-1">設定</button>
            <button onclick="switchTab('plan')" id="btn-plan" class="nav-btn text-xs font-black pb-1 text-slate-400">教練計劃</button>
            <button onclick="switchTab('calc')" id="btn-calc" class="nav-btn text-xs font-black pb-1 text-slate-400">熱量紀錄</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div id="tab-profile" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                <p class="text-[10px] font-black text-blue-600 uppercase mb-2 tracking-widest text-center">Personal Profile</p>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="age" placeholder="歲數" class="w-full p-4 bg-slate-50 rounded-2xl border-0 text-sm">
                        <input type="number" id="height" placeholder="身高 cm" class="w-full p-4 bg-slate-50 rounded-2xl border-0 text-sm">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weight" placeholder="現時 kg" class="w-full p-4 bg-slate-50 rounded-2xl border-0 text-sm">
                        <input type="number" id="target_weight" placeholder="目標 kg" class="w-full p-4 bg-blue-50 rounded-2xl border-0 text-sm font-bold">
                    </div>
                    <textarea id="habit" placeholder="有冇傷患？想瘦邊度？平時鍾意食咩？" class="w-full p-4 bg-slate-50 rounded-2xl border-0 text-sm h-28"></textarea>
                    <button onclick="startAiAnalysis()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition">啟動地獄教練模式 ✨</button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-6">
            <div id="ai-loading" class="hidden text-center py-20">
                <div class="inline-block animate-spin rounded-full h-10 w-10 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-sm font-bold text-slate-500">教練執緊餐單，等陣...</p>
            </div>

            <div id="ai-result" class="hidden space-y-6">
                <div class="mentor-card p-6 rounded-[32px] text-white">
                    <h3 class="text-blue-400 font-black text-xs uppercase mb-2 tracking-tighter">Coach's Analysis</h3>
                    <p id="strategy-text" class="text-sm leading-relaxed mb-6"></p>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                            <p class="text-[9px] opacity-50 uppercase">每日熱量上限</p>
                            <p class="text-xl font-black"><span id="target-kcal">0</span> <span class="text-[10px]">kcal</span></p>
                        </div>
                        <div class="bg-white/5 p-4 rounded-2xl border border-white/10">
                            <p class="text-[9px] opacity-50 uppercase">建議周期</p>
                            <p class="text-xl font-black"><span id="target-timeline">0</span></p>
                        </div>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                    <h4 class="font-black text-slate-800 mb-4 flex items-center gap-2">🥗 地道飲食餐單</h4>
                    <div id="diet-plan" class="text-sm text-slate-600 leading-relaxed space-y-3"></div>
                </div>

                <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                    <h4 class="font-black text-slate-800 mb-4 flex items-center gap-2">🏋️ 24/7 健身清單</h4>
                    <div id="workout-plan" class="text-sm text-slate-600 leading-relaxed space-y-3"></div>
                </div>
            </div>
        </div>

        <div id="tab-calc" class="tab-content space-y-6">
            <div class="bg-slate-900 p-10 rounded-[40px] text-white text-center">
                <p class="text-slate-500 text-[10px] font-black uppercase mb-2">今日剩餘配額</p>
                <div class="text-7xl font-black mb-4 tracking-tighter text-blue-500" id="kcal-left">--</div>
                <div class="flex justify-center gap-4 text-[10px] font-bold">
                    <span class="bg-white/5 px-3 py-1 rounded-full text-slate-400">目標: <span id="kcal-target-val">--</span></span>
                    <span class="bg-white/5 px-3 py-1 rounded-full text-red-400">已食: <span id="kcal-consumed">0</span></span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <button onclick="addKcal(400)" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center active:bg-slate-50">
                    <span class="block text-xl mb-1">🍚</span>
                    <span class="text-xs font-black">正餐 (+400)</span>
                </button>
                <button onclick="addKcal(200)" class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm text-center active:bg-slate-50">
                    <span class="block text-xl mb-1">🍰</span>
                    <span class="text-xs font-black">零食 (+200)</span>
                </button>
            </div>
            <button onclick="resetKcal()" class="w-full text-slate-400 text-[10px] font-black uppercase tracking-widest py-4">Reset Today</button>
        </div>

    </main>

    <script>
        const GROQ_KEY = "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";
        let state = { plan: { targetKcal: 2000 }, consumed: 0 };

        async function startAiAnalysis() {
            const age = document.getElementById('age').value;
            const w = document.getElementById('weight').value;
            const tw = document.getElementById('target_weight').value;
            const h = document.getElementById('height').value;
            const habit = document.getElementById('habit').value;

            if(!age || !w || !tw || !h) return alert("填晒資料先啦！");

            switchTab('plan');
            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-result').classList.add('hidden');

            const prompt = `你係一位性格火爆但專業嘅 24/7 Fitness 私人教練。
            用戶資料：${age}歲, ${w}kg, 目標${tw}kg, 身高${h}cm, 備註：${habit}。
            請以「極度地道廣東話」生成詳細計劃：
            [STRATEGY: 分析佢點解肥，要點樣改變心態，50字內]
            [KCAL: 淨數字]
            [TIME: 例如 12 星期]
            [DIET: 分開列出早餐、午餐、下午茶、晚餐嘅具體建議，要有份量]
            [WORKOUT: 列出 3-4 部 24/7 必玩機器名，寫埋要做幾多組幾多次]`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: prompt }]
                    })
                });

                const data = await response.json();
                const text = data.choices[0].message.content;

                const extract = (tag) => text.match(new RegExp(`\\[${tag}:\\s*([\\s\\S]*?)\\]`))?.[1]?.trim() || "教練話冇資料";

                document.getElementById('strategy-text').innerText = extract('STRATEGY');
                document.getElementById('target-kcal').innerText = extract('KCAL');
                document.getElementById('target-timeline').innerText = extract('TIME');
                document.getElementById('diet-plan').innerHTML = extract('DIET').replace(/\n/g, '<br>');
                document.getElementById('workout-plan').innerHTML = extract('WORKOUT').replace(/\n/g, '<br>');
                
                // 自動將 AI 建議嘅 KCAL 同計數機連動
                state.plan.targetKcal = parseInt(extract('KCAL')) || 2000;
                updateCalc();
                save();

                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-result').classList.remove('hidden');
            } catch (e) {
                alert("教練斷咗線，再試多次！");
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function addKcal(amt) { state.consumed += amt; updateCalc(); save(); }
        function resetKcal() { state.consumed = 0; updateCalc(); save(); }
        function updateCalc() {
            const target = state.plan.targetKcal;
            document.getElementById('kcal-target-val').innerText = target;
            document.getElementById('kcal-consumed').innerText = state.consumed;
            document.getElementById('kcal-left').innerText = target - state.consumed;
        }
        function save() { localStorage.setItem('fit_data_pro', JSON.stringify(state)); }
        function load() {
            const s = localStorage.getItem('fit_data_pro');
            if(s) { state = JSON.parse(s); updateCalc(); }
        }
        load();
    </script>
</body>
</html>
