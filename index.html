<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitCoach AI - 正式版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+HK', sans-serif; background-color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .nav-btn.active { color: #2563eb; border-bottom: 3px solid #2563eb; }
        .mentor-card { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
    </style>
</head>
<body class="min-h-screen pb-20">

    <nav class="bg-white border-b sticky top-0 z-50 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-slate-900">FitCoach<span class="text-blue-600">AI</span></h1>
        <div class="flex gap-4">
            <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn active text-xs font-bold pb-1">設定</button>
            <button onclick="switchTab('plan')" id="btn-plan" class="nav-btn text-xs font-bold pb-1 text-slate-400">計劃</button>
            <button onclick="switchTab('calc')" id="btn-calc" class="nav-btn text-xs font-bold pb-1 text-slate-400">紀錄</button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">

        <div id="tab-profile" class="tab-content active space-y-4">
            <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                <h2 class="text-lg font-black text-slate-800 mb-4 text-center">你的私人減肥導師</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="age" placeholder="年齡" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                        <input type="number" id="height" placeholder="身高(cm)" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" id="weight" placeholder="現時體重(kg)" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                        <input type="number" id="target_weight" placeholder="目標體重(kg)" class="w-full p-3 bg-blue-50 rounded-2xl border-0 text-sm font-bold outline-none">
                    </div>
                    <select id="activity" class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm outline-none">
                        <option value="久坐">日常久坐 (Office/學生)</option>
                        <option value="中度">中度活動 (每週做 2-3 次運動)</option>
                        <option value="高度">高度活動 (體力勞動/重訓愛好者)</option>
                    </select>
                    <textarea id="habit" placeholder="備註：飲食偏好、舊患、預計減肥時間..." class="w-full p-3 bg-slate-50 rounded-2xl border-0 text-sm h-24 outline-none"></textarea>
                    
                    <button onclick="startAiAnalysis()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition">
                        啟動 AI 分析與計劃生成 ✨
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-6">
            <div id="ai-loading" class="hidden text-center py-20">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent mb-4"></div>
                <p class="text-sm text-slate-500 font-bold">AI 導師正在為您計算中...</p>
            </div>

            <div id="ai-error" class="hidden bg-red-50 border border-red-200 p-4 rounded-2xl text-red-600 text-xs">
                <p class="font-bold mb-1">❌ 連線失敗：</p>
                <code id="error-msg" class="block bg-white/50 p-2 rounded mt-2"></code>
            </div>

            <div id="ai-result" class="hidden space-y-6">
                <div class="mentor-card p-6 rounded-[32px] text-white shadow-2xl">
                    <h3 class="text-lg font-black italic mb-2 tracking-wide">Mentor's Strategy</h3>
                    <p id="strategy-text" class="text-xs leading-relaxed opacity-90 mb-4"></p>
                    <div class="grid grid-cols-2 gap-2">
                        <div class="bg-white/10 p-3 rounded-xl border border-white/10">
                            <span class="block text-[8px] opacity-60 uppercase">每日熱量目標</span>
                            <span id="target-kcal" class="font-bold text-sm"></span> kcal
                        </div>
                        <div class="bg-white/10 p-3 rounded-xl border border-white/10">
                            <span class="block text-[8px] opacity-60 uppercase">建議達成時間</span>
                            <span id="target-timeline" class="font-bold text-sm"></span>
                        </div>
                    </div>
                </div>
                <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                    <h4 class="font-bold text-slate-800 mb-3 text-sm flex items-center">🥗 專屬飲食建議</h4>
                    <div id="diet-plan" class="text-xs text-slate-600 leading-relaxed space-y-2"></div>
                </div>
                <div class="bg-white p-6 rounded-[32px] shadow-sm border border-slate-100">
                    <h4 class="font-bold text-slate-800 mb-3 text-sm flex items-center">🏋️ 247 健身清單</h4>
                    <div id="workout-plan" class="text-xs text-slate-600 leading-relaxed"></div>
                </div>
            </div>
        </div>

        <div id="tab-calc" class="tab-content space-y-6">
            <div class="bg-slate-900 p-10 rounded-[40px] text-white text-center shadow-2xl">
                <p class="text-slate-400 text-[10px] font-bold uppercase mb-1 tracking-widest">今日剩餘</p>
                <div class="text-6xl font-black mb-2 tracking-tighter" id="kcal-left">--</div>
                <div class="text-[10px] opacity-40">目標: <span id="kcal-target-val">--</span> | 已攝取: <span id="kcal-consumed">0</span></div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="addKcal(500)" class="bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm text-xs font-black active:bg-slate-50">食咗正餐<br><span class="opacity-40 text-[9px]">+500 kcal</span></button>
                <button onclick="addKcal(200)" class="bg-white p-6 rounded-[24px] border border-slate-100 shadow-sm text-xs font-black active:bg-slate-50">食咗零食<br><span class="opacity-40 text-[9px]">+200 kcal</span></button>
            </div>
            <button onclick="resetKcal()" class="w-full text-[10px] text-slate-300 font-black uppercase tracking-widest pt-4">重設今日紀錄</button>
        </div>

    </main>

    <script>
        // --- 設定 ---
        const API_KEY = "AIzaSyAj2PG2SUPmAq2vh-WA3G3XcZ78VH5rLzQ";
        // 修正後的 URL 格式
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;
        
        let state = { profile: {}, plan: null, consumed: 0 };

        async function startAiAnalysis() {
            const age = document.getElementById('age').value;
            const w = document.getElementById('weight').value;
            const tw = document.getElementById('target_weight').value;
            const h = document.getElementById('height').value;
            const act = document.getElementById('activity').value;
            const habit = document.getElementById('habit').value;

            if(!age || !w || !tw || !h) return alert("請填好基本資料！");

            state.profile = { age, weight: w, target_weight: tw, height: h, activity: act, habit };
            
            switchTab('plan');
            window.scrollTo(0,0);
            document.getElementById('ai-loading').classList.remove('hidden');
            document.getElementById('ai-result').classList.add('hidden');
            document.getElementById('ai-error').classList.add('hidden');

            const prompt = `你係專業香港減肥導師。用戶${age}歲, 現時${w}kg, 目標${tw}kg, 身高${h}cm, 活動量${act}, 備註${habit}。
            請根據以上資料，以地道廣東話生成：[STRATEGY: 分析][KCAL: 數字][TIME: 時間][DIET: 飲食詳情][WORKOUT: 健身詳情]`;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : "未知連線錯誤");
                }

                const text = data.candidates[0].content.parts[0].text;
                const extract = (tag) => text.match(new RegExp(`\\[${tag}:\\s*([\\s\\S]*?)\\]`))?.[1] || "未提供";

                document.getElementById('strategy-text').innerText = extract('STRATEGY');
                document.getElementById('target-kcal').innerText = extract('KCAL');
                document.getElementById('target-timeline').innerText = extract('TIME');
                document.getElementById('diet-plan').innerHTML = extract('DIET').replace(/\n/g, '<br>');
                document.getElementById('workout-plan').innerHTML = extract('WORKOUT').replace(/\n/g, '<br>');
                
                state.plan = { targetKcal: parseInt(extract('KCAL')) || 2000 };
                save();
                updateCalc();

                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-result').classList.remove('hidden');
            } catch (e) {
                document.getElementById('ai-loading').classList.add('hidden');
                document.getElementById('ai-error').classList.remove('hidden');
                document.getElementById('error-msg').innerText = e.message;
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
        }

        function addKcal(amt) { state.consumed += amt; updateCalc(); save(); }
        function resetKcal() { if(confirm("重設今日紀錄？")) { state.consumed = 0; updateCalc(); save(); } }

        function updateCalc() {
            const target = (state.plan && state.plan.targetKcal) ? state.plan.targetKcal : 2000;
            document.getElementById('kcal-target-val').innerText = target;
            document.getElementById('kcal-consumed').innerText = state.consumed;
            document.getElementById('kcal-left').innerText = target - state.consumed;
        }

        function save() { localStorage.setItem('fitCoach_vFinal_Live', JSON.stringify(state)); }
        function load() {
            const saved = localStorage.getItem('fitCoach_vFinal_Live');
            if(saved) {
                state = JSON.parse(saved);
                updateCalc();
            }
        }
        load();
    </script>
</body>
</html>
