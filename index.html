<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FitCoach Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;700;900&display=swap');
        body { font-family: 'Noto+Sans+HK', sans-serif; background: #0b0f19; color: #ffffff; -webkit-tap-highlight-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .app-card { background: #161c2d; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03); }
        .nav-btn.active { color: #3b82f6; position: relative; }
        .nav-btn.active::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background: #3b82f6; border-radius: 50%; }
        
        /* Being Sport Timeline Dot */
        .timeline-item { position: relative; padding-left: 20px; }
        .timeline-item::before { content: ''; position: absolute; left: 0px; top: 10px; width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .diet-item::before { background: #f97316; box-shadow: 0 0 10px #f97316; }

        .task-checked { opacity: 0.3; filter: grayscale(1); border: 1px dashed rgba(255,255,255,0.1) !important; background: transparent !important; }
        input, textarea { outline: none !important; }
    </style>
</head>
<body class="pb-24">

    <header class="px-8 py-8 flex justify-between items-end sticky top-0 bg-[#0b0f19]/90 backdrop-blur-xl z-50">
        <div>
            <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.3em] mb-1">FitCoach Pro</p>
            <h1 class="text-2xl font-black tracking-tight" id="header-title">個人化計劃</h1>
        </div>
        <div class="flex gap-5 text-xs font-bold text-slate-500">
            <button onclick="switchTab('profile')" id="btn-profile" class="nav-btn active">設定</button>
            <button onclick="switchTab('plan')" id="btn-plan" class="nav-btn">今日</button>
            <button onclick="switchTab('week')" id="btn-week" class="nav-btn">課表</button>
            <button onclick="switchTab('stats')" id="btn-stats" class="nav-btn">趨勢</button>
        </div>
    </header>

    <main class="max-w-md mx-auto px-6 space-y-8">

        <div id="tab-profile" class="tab-content active space-y-6">
            <div class="app-card p-6 space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">年齡 Age</label>
                        <input type="number" id="age" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm" placeholder="25">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">身高 CM</label>
                        <input type="number" id="height" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm" placeholder="175">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">現時 KG</label>
                        <input type="number" id="weight" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm font-bold text-blue-400" placeholder="75">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">目標 KG</label>
                        <input type="number" id="target_weight" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm font-bold text-green-400" placeholder="65">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">個人需求 (如：膝痛、自煮)</label>
                    <textarea id="habit" class="w-full p-4 bg-white/5 rounded-2xl border-0 text-sm h-24 resize-none" placeholder="想減肚腩、有膝頭舊患..."></textarea>
                </div>
                <button onclick="startAiAnalysis()" id="gen-btn" class="w-full bg-blue-600 py-5 rounded-2xl font-black text-sm shadow-[0_0_20px_rgba(59,130,246,0.3)] active:scale-95 transition-all">
                    更新 Groq AI 計劃 ✨
                </button>
            </div>
        </div>

        <div id="tab-plan" class="tab-content space-y-8">
            <div class="app-card p-6 border-l-4 border-blue-500 bg-gradient-to-br from-blue-500/10 to-transparent">
                <h3 class="text-[10px] font-black text-blue-400 mb-2 uppercase tracking-[0.2em]">Mentor Analysis</h3>
                <p id="strategy-text" class="text-xs text-slate-300 leading-relaxed italic">請先設定個人資料...</p>
            </div>

            <div class="space-y-4">
                <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">🥗 飲食安排</h4>
                <div id="diet-list" class="space-y-3"></div>
            </div>

            <div class="space-y-4">
                <h4 class="text-[10px] font-black text-slate-500 uppercase tracking-widest">🏋️ 訓練任務</h4>
                <div id="workout-list" class="space-y-3"></div>
            </div>
        </div>

        <div id="tab-week" class="tab-content space-y-4">
            <div id="week-list" class="space-y-2"></div>
        </div>

        <div id="tab-stats" class="tab-content space-y-6">
            <div class="app-card p-6"><canvas id="weightChart"></canvas></div>
            <div class="flex gap-3">
                <input type="number" id="today-w" step="0.1" class="flex-1 p-4 bg-[#161c2d] rounded-2xl border-0 text-sm" placeholder="輸入體重">
                <button onclick="logWeight()" class="bg-blue-600 px-8 rounded-2xl font-black text-xs">紀錄</button>
            </div>
        </div>

    </main>

    <script>
        const GROQ_KEY = "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";
        let state = { weightHistory: [] };

        async function startAiAnalysis() {
            const age = document.getElementById('age').value;
            const h = document.getElementById('height').value;
            const w = document.getElementById('weight').value;
            const tw = document.getElementById('target_weight').value;
            const habit = document.getElementById('habit').value;
            const btn = document.getElementById('gen-btn');

            if(!age || !h || !w || !tw) return alert("請填寫完整數據");
            
            btn.innerText = "Groq 正在快速運算...";
            btn.disabled = true;

            const prompt = `你係專業健身導師。用戶：${age}歲, ${h}cm, 現時${w}kg -> 目標${tw}kg, 需求：${habit}。
            請以廣東話生成：
            [STRATEGY:一句到位戰略]
            [DIET: 早餐|做法; 午餐|做法; 晚餐|做法]
            [WORKOUT: 動作|組數; 動作|組數; 動作|組數]
            [WEEKLY: 週一:重點|動作; 週二:重點|動作; 週三:重點|動作; 週四:重點|動作; 週五:重點|動作; 週六:重點|動作; 週日:重點|動作]`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: prompt }] })
                });

                const data = await response.json();
                const resText = data.choices[0].message.content;
                const extract = (tag) => resText.match(new RegExp(`\\[${tag}:\\s*([\\s\\S]*?)\\]`))?.[1]?.trim() || "";

                document.getElementById('strategy-text').innerText = extract('STRATEGY');
                
                // 渲染 Diet
                document.getElementById('diet-list').innerHTML = extract('DIET').split(';').map(i => {
                    const [n, d] = i.split('|');
                    return `<div class="app-card p-4 flex items-center justify-between timeline-item diet-item" onclick="this.classList.toggle('task-checked')">
                        <div><p class="text-sm font-bold">${n}</p><p class="text-[10px] text-slate-500 mt-0.5">${d||''}</p></div>
                        <div class="w-5 h-5 border border-white/10 rounded-lg flex items-center justify-center"><div class="w-2 h-2 bg-orange-500 rounded-sm opacity-0 check-mark"></div></div>
                    </div>`;
                }).join('');

                // 渲染 Workout
                document.getElementById('workout-list').innerHTML = extract('WORKOUT').split(';').map(i => {
                    const [n, s] = i.split('|');
                    return `<div class="app-card p-4 flex items-center justify-between timeline-item" onclick="this.classList.toggle('task-checked')">
                        <div><p class="text-sm font-black uppercase tracking-tight">${n}</p><p class="text-[10px] text-blue-500 font-bold mt-0.5">${s||''}</p></div>
                        <div class="w-5 h-5 border border-white/10 rounded-lg"></div>
                    </div>`;
                }).join('');

                // 渲染 Weekly
                document.getElementById('week-list').innerHTML = extract('WEEKLY').split(';').map(wk => {
                    const [day, info] = wk.split(':');
                    const [focus, acts] = (info || '').split('|');
                    return `<div class="bg-white/5 p-4 rounded-2xl flex justify-between items-center">
                        <span class="text-[10px] font-black text-slate-500 w-10">${day}</span>
                        <span class="text-xs font-bold text-blue-400">${focus||'休息'}</span>
                        <span class="text-[10px] text-slate-600">${acts||'Recovery'}</span>
                    </div>`;
                }).join('');

                switchTab('plan');
                localStorage.setItem('fitcoach_profile', JSON.stringify({age, h, w, tw, habit}));
            } catch (e) { alert("Groq API 連線失敗"); }
            finally { btn.innerText = "更新 Groq AI 計劃 ✨"; btn.disabled = false; }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            const titles = { 'profile': '設定個人資料', 'plan': '今日日記', 'week': '每週課表', 'stats': '數據趨勢' };
            document.getElementById('header-title').innerText = titles[tab];
            if(tab === 'stats') initChart();
        }

        function logWeight() {
            const w = document.getElementById('today-w').value;
            if(!w) return;
            state.weightHistory.push({ date: new Date().toLocaleDateString('zh-HK', {month:'short', day:'numeric'}), weight: parseFloat(w) });
            localStorage.setItem('fitcoach_stats', JSON.stringify(state));
            initChart();
        }

        let chart;
        function initChart() {
            const ctx = document.getElementById('weightChart').getContext('2d');
            if(chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: state.weightHistory.map(h => h.date),
                    datasets: [{ data: state.weightHistory.map(h => h.weight), borderColor: '#3b82f6', tension: 0.4 }]
                },
                options: { plugins: { legend: { display: false } } }
            });
        }

        // 載入緩存
        const savedProfile = JSON.parse(localStorage.getItem('fitcoach_profile') || '{}');
        if(savedProfile.age) {
            document.getElementById('age').value = savedProfile.age;
            document.getElementById('height').value = savedProfile.h;
            document.getElementById('weight').value = savedProfile.w;
            document.getElementById('target_weight').value = savedProfile.tw;
            document.getElementById('habit').value = savedProfile.habit;
        }
        state = JSON.parse(localStorage.getItem('fitcoach_stats') || '{"weightHistory":[]}');
    </script>
</body>
</html>
